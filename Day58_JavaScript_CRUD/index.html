<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />

    <title>Employee Manager</title>

    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <main class="container">
      <h1>Day58 JavaScript_CRUD</h1>

      <div class="form-group">
        <label for="name">姓名</label>
        <input type="text" id="name" placeholder="請輸入員工姓名" />
      </div>

      <div class="form-group">
        <label for="position">職位</label>
        <input type="text" id="position" placeholder="請輸入員工職位" />
      </div>

      <div class="form-group">
        <label for="salary">薪資</label>
        <input type="number" id="salary" min="0" placeholder="請輸入員工薪資" />
      </div>

      <button type="button" id="addBtn">Add Employee</button>

      <p id="errorMessage" class="error-message"></p>

      <section id="list" class="employee-list"></section>
    </main>

    <script src="./javascript.js" defer></script>
  </body>
</html>
