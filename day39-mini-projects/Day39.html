<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div id="display">0</div>

      <div class="tools">
        <button id="deleteBtn">DEL</button>
        <button id="allclearBtn">AC</button>
      </div>

      <div id="btns">
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>+</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>-</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>*</button>

        <button>0</button>
        <button>.</button>
        <button>=</button>
        <button>/</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
