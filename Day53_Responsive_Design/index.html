<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Day53 Responsive Design</title>
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">LOGO</div>

      <ul class="nav-menu">
        <li>Home</li>
        <li>About</li>
        <li>Services</li>
        <li>Contact</li>
      </ul>
    </nav>

    <section class="hero">
      <h1>Welcome to My Website</h1>

      <p>Learn Responsive Design</p>

      <div class="buttons">
        <button>Get Started</button>
        <button>Learn More</button>
      </div>
    </section>

    <section class="features">
      <div class="feature">Feature 1</div>
      <div class="feature">Feature 2</div>
      <div class="feature">Feature 3</div>
    </section>

    <div class="contact">
      <h2>Contact Us</h2>
      <input type="text" class="inputname" placeholder="Name" />
      <input type="email" class="inputemail" placeholder="Email" />
      <textarea name="message" class="inputmessage" placeholder="Message"></textarea>
      <button>Send</button>
    </div>

    <footer>©2026 CHENG CHIH-WEN</footer>
  </body>
</html>
